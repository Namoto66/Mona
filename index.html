<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Animal Carnival Shooter</title>

<style>

body{
background:#0f1720;
color:white;
text-align:center;
font-family:Arial;
}

h1{
margin-top:10px;
}

canvas{
background:#18222e;
border:4px solid #ffffff;
cursor:none;
}

#ui{
margin:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
background:#3b82f6;
border:none;
color:white;
border-radius:5px;
}

</style>
</head>

<body>

<h1>🦊 Animal Carnival Shooter</h1>

<div id="ui">
Score: <span id="score">0</span> |
Combo: <span id="combo">0</span> |
Time: <span id="time">60</span> |
Highscore: <span id="highscore">0</span>
</div>

<canvas id="game" width="900" height="500"></canvas>
<br><br>

<button onclick="startGame()">Start Game</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let combo=0;
let time=60;
let gameRunning=false;

let mouseX=0;
let mouseY=0;

let animals=[];
let effects=[];

let highscore=localStorage.getItem("animalHigh")||0;
document.getElementById("highscore").textContent=highscore;

const shotSound=new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg");
const hitSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

const animalTypes=[
{emoji:"🐰",points:10,size:35},
{emoji:"🦊",points:20,size:30},
{emoji:"🐻",points:30,size:40},
{emoji:"🐼",points:40,size:28},
{emoji:"🐯",points:50,size:25}
];

function spawnAnimal(){

let type=animalTypes[Math.floor(Math.random()*animalTypes.length)];

animals.push({
x:Math.random()*800+50,
y:Math.random()*400+50,
dx:(Math.random()*4+1)*(Math.random()<0.5?-1:1),
dy:(Math.random()*4+1)*(Math.random()<0.5?-1:1),
size:type.size,
emoji:type.emoji,
points:type.points
});

}

function startGame(){

score=0;
combo=0;
time=60;
animals=[];
gameRunning=true;

for(let i=0;i<5;i++) spawnAnimal();

document.getElementById("score").textContent=score;
document.getElementById("combo").textContent=combo;
document.getElementById("time").textContent=time;

let timer=setInterval(()=>{

if(!gameRunning){
clearInterval(timer);
return;
}

time--;
document.getElementById("time").textContent=time;

if(time<=0){

gameRunning=false;

if(score>highscore){
highscore=score;
localStorage.setItem("animalHigh",highscore);
}

alert("Game Over! Score: "+score);

}

},1000);

}

canvas.addEventListener("mousemove",e=>{

let rect=canvas.getBoundingClientRect();
mouseX=e.clientX-rect.left;
mouseY=e.clientY-rect.top;

});

canvas.addEventListener("click",()=>{

if(!gameRunning) return;

shotSound.currentTime=0;
shotSound.play();

for(let i=animals.length-1;i>=0;i--){

let a=animals[i];

let dist=Math.sqrt(
(mouseX-a.x)**2+
(mouseY-a.y)**2
);

if(dist<a.size){

hitSound.currentTime=0;
hitSound.play();

combo++;

let gained=a.points*combo;

score+=gained;

document.getElementById("score").textContent=score;
document.getElementById("combo").textContent=combo;

effects.push({x:a.x,y:a.y,life:20});

animals.splice(i,1);
spawnAnimal();

return;

}

}

combo=0;
document.getElementById("combo").textContent=combo;

});

function updateAnimals(){

for(let a of animals){

a.x+=a.dx;
a.y+=a.dy;

if(a.x<a.size||a.x>900-a.size) a.dx*=-1;
if(a.y<a.size||a.y>500-a.size) a.dy*=-1;

}

}

function drawAnimals(){

ctx.font="40px serif";
ctx.textAlign="center";
ctx.textBaseline="middle";

for(let a of animals){

ctx.font=a.size+"px serif";
ctx.fillText(a.emoji,a.x,a.y);

}

}

function drawEffects(){

for(let i=effects.length-1;i>=0;i--){

let e=effects[i];

ctx.beginPath();
ctx.arc(e.x,e.y,40-e.life,0,Math.PI*2);
ctx.strokeStyle="yellow";
ctx.stroke();

e.life--;

if(e.life<=0) effects.splice(i,1);

}

}

function drawCrosshair(){

ctx.strokeStyle="white";

ctx.beginPath();
ctx.moveTo(mouseX-15,mouseY);
ctx.lineTo(mouseX+15,mouseY);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(mouseX,mouseY-15);
ctx.lineTo(mouseX,mouseY+15);
ctx.stroke();

}

function gameLoop(){

ctx.clearRect(0,0,900,500);

if(gameRunning){

updateAnimals();
drawAnimals();

}

drawEffects();
drawCrosshair();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
