<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>勇者の大冒険 ～失われた世界～</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#222;
border:3px solid white;
}

#ui{
margin-top:10px;
}
</style>
</head>

<body>

<h1>勇者の大冒険<br>～失われた世界～</h1>

<div id="start">

<p>勇者の名前を入力してください</p>

<input id="nameInput">
<button onclick="startGame()">冒険を始める</button>

</div>

<canvas id="game" width="800" height="500" style="display:none"></canvas>

<div id="ui"></div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
const ui=document.getElementById("ui")

let heroName="勇者"

function startGame(){

heroName=document.getElementById("nameInput").value

if(heroName=="") heroName="勇者"

document.getElementById("start").style.display="none"
canvas.style.display="block"

state="village"

}

let state="title"

let player={
x:380,
y:250,
hp:60,
atk:10,
level:1
}

let party=[heroName]

let enemy=null

let villagers=[
{x:200,y:200,text:"魔王ヴォルカが世界を支配してしまった…"},
{x:500,y:220,text:"森には宝箱があるらしいぞ"}
]

let chest={
x:400,
y:350,
opened:false
}

document.addEventListener("keydown",key)

function key(e){

if(state=="village"){

if(e.key=="ArrowUp")player.y-=20
if(e.key=="ArrowDown")player.y+=20
if(e.key=="ArrowLeft")player.x-=20
if(e.key=="ArrowRight")player.x+=20

if(e.key==" "){

talk()

openChest()

}

}

if(state=="forest"){

if(Math.random()<0.2){

startBattle()

}

}

if(state=="battle"){

if(e.key=="1")attack()
if(e.key=="2")magic()

}

}

function talk(){

for(let v of villagers){

if(Math.abs(player.x-v.x)<60 && Math.abs(player.y-v.y)<60){

ui.innerText=v.text
return

}

}

}

function openChest(){

if(!chest.opened &&
Math.abs(player.x-chest.x)<50 &&
Math.abs(player.y-chest.y)<50){

chest.opened=true

ui.innerText="宝箱を開けた！ポーションを手に入れた！"

}

}

function startBattle(){

state="battle"

let r=Math.random()

if(r<0.25) enemy={name:"スライム",hp:20,atk:4}
else if(r<0.5) enemy={name:"鬼",hp:30,atk:6}
else if(r<0.75) enemy={name:"雷鬼",hp:35,atk:7}
else enemy={name:"ミニドラゴン",hp:45,atk:9}

ui.innerText=enemy.name+" が現れた！"

}

function attack(){

let dmg=player.atk+Math.floor(Math.random()*6)

enemy.hp-=dmg

ui.innerText=heroName+" の攻撃！ "+dmg+"ダメージ！"

enemyTurn()

}

function magic(){

let dmg=15+Math.floor(Math.random()*8)

enemy.hp-=dmg

ui.innerText="ファイア！ "+dmg+"ダメージ！"

enemyTurn()

}

function enemyTurn(){

if(enemy.hp<=0){

ui.innerText=enemy.name+" を倒した！"

if(party.length<3 && Math.random()<0.4){

party.push(enemy.name)

ui.innerText+=" "+enemy.name+" が仲間になった！"

}

state="village"
return

}

let dmg=enemy.atk+Math.floor(Math.random()*5)

player.hp-=dmg

ui.innerText=enemy.name+" の攻撃！ "+dmg+"ダメージ"

if(player.hp<=0){

state="gameover"

}

}

function drawVillage(){

ctx.fillStyle="green"
ctx.fillRect(0,0,800,500)

ctx.fillStyle="white"
ctx.fillText("始まりの村",20,20)

ctx.fillStyle="blue"
ctx.fillRect(player.x,player.y,40,40)

ctx.fillStyle="yellow"

for(let v of villagers){

ctx.fillRect(v.x,v.y,40,40)

}

ctx.fillStyle="orange"

if(!chest.opened){

ctx.fillRect(chest.x,chest.y,40,40)

}

}

function drawBattle(){

ctx.fillStyle="black"
ctx.fillRect(0,0,800,500)

ctx.fillStyle="white"

ctx.font="25px sans-serif"

ctx.fillText(enemy.name+" が現れた！",300,100)

ctx.fillText("敵HP: "+enemy.hp,350,200)

ctx.fillText("1 攻撃",300,350)
ctx.fillText("2 魔法",420,350)

ctx.fillText(heroName+" HP:"+player.hp,20,20)

}

function drawGameOver(){

ctx.fillStyle="black"
ctx.fillRect(0,0,800,500)

ctx.fillStyle="red"

ctx.font="50px sans-serif"

ctx.fillText("GAME OVER",260,250)

}

function loop(){

ctx.clearRect(0,0,800,500)

if(state=="village") drawVillage()
if(state=="battle") drawBattle()
if(state=="gameover") drawGameOver()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
