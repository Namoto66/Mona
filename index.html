<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Library Escape</title>
<style>
body{
  margin:0;
  background:#0b0b12;
  color:#d6d6ff;
  font-family:"Courier New",monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#title{font-size:28px;margin-bottom:8px}

#story{
  font-size:14px;
  margin-bottom:12px;
  max-width:500px;
  text-align:center;
  opacity:0.9;
}

#game{
  display:grid;
  grid-template-columns:repeat(12,32px);
  grid-template-rows:repeat(12,32px);
  gap:2px;
}

.cell{width:32px;height:32px;background:#111;border-radius:3px}
.wall{background:#444}
.player{background:#7afcff}
.shelf{background:#9b7bff}
.door{background:#ffd166}
.key{background:#7cff7c}

#message{
  margin-top:10px;
  min-height:20px;
  font-size:14px;
}

button{
  margin-top:10px;
  background:#111;
  border:1px solid #aaa;
  color:white;
  padding:6px 12px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="title">Night Library Escape</div>
<div id="story">放課後、図書館で本を読んでいると…いつの間にか電気が消えていました。ドアは閉まっています。本棚を調べて、鍵を見つけて脱出しましょう。</div>

<div id="game"></div>
<div id="message"></div>
<button onclick="startGame()">Restart</button>

<script>
const size=12
let maze=[]
let player={x:1,y:1}
let key={x:0,y:0}
let door={x:size-2,y:size-2}
let hasKey=false

const game=document.getElementById("game")
const message=document.getElementById("message")

/* -------- sound system -------- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function playSound(freq,duration,type="sine"){
 const osc=audioCtx.createOscillator()
 const gain=audioCtx.createGain()
 osc.type=type
 osc.frequency.value=freq
 osc.connect(gain)
 gain.connect(audioCtx.destination)

 gain.gain.setValueAtTime(0.1,audioCtx.currentTime)
 osc.start()
 osc.stop(audioCtx.currentTime+duration)
}

function stepSound(){playSound(220,0.05,"square")}
function keySound(){playSound(880,0.15,"triangle")}
function shelfSound(){playSound(140,0.12,"sawtooth")}
function doorSound(){playSound(520,0.25,"triangle")}

/* -------- map generation -------- */
function randomMap(){
 maze=[]
 for(let y=0;y<size;y++){
  let row=[]
  for(let x=0;x<size;x++){
   if(x===0||y===0||x===size-1||y===size-1) row.push(1)
   else if(Math.random()<0.18) row.push(2)
   else row.push(0)
  }
  maze.push(row)
 }
}

function placeKey(){
 while(true){
  let x=Math.floor(Math.random()*size)
  let y=Math.floor(Math.random()*size)
  if(maze[y][x]===0 && !(x===player.x&&y===player.y)){
   key={x,y}
   break
  }
 }
}

/* -------- drawing -------- */
function draw(){
 game.innerHTML=""

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
   const cell=document.createElement("div")
   cell.classList.add("cell")

   if(maze[y][x]===1) cell.classList.add("wall")
   if(maze[y][x]===2) cell.classList.add("shelf")

   if(player.x===x&&player.y===y) cell.classList.add("player")
   if(key.x===x&&key.y===y&&!hasKey) cell.classList.add("key")
   if(door.x===x&&door.y===y) cell.classList.add("door")

   game.appendChild(cell)
  }
 }
}

/* -------- movement -------- */
function move(dx,dy){
 const nx=player.x+dx
 const ny=player.y+dy

 if(maze[ny][nx]===1) return

 player.x=nx
 player.y=ny
 stepSound()

 if(maze[ny][nx]===2){
  shelfSound()
  message.textContent="本棚を調べた…古い本しかない。"
 }

 if(nx===key.x&&ny===key.y&&!hasKey){
  hasKey=true
  keySound()
  message.textContent="鍵を見つけた！出口を探そう。"
 }

 if(nx===door.x&&ny===door.y){
  if(hasKey){
   doorSound()
   message.textContent="鍵でドアを開けた。外に出られた！クリア！"
  }else{
   message.textContent="ドアは鍵がかかっている。"
  }
 }

 draw()
}

/* -------- controls -------- */
document.addEventListener("keydown",e=>{
 if(e.key==="ArrowUp") move(0,-1)
 if(e.key==="ArrowDown") move(0,1)
 if(e.key==="ArrowLeft") move(-1,0)
 if(e.key==="ArrowRight") move(1,0)
})

function startGame(){
 player={x:1,y:1}
 door={x:size-2,y:size-2}
 hasKey=false
 message.textContent=""
 randomMap()
 placeKey()
 draw()
}

startGame()
</script>

</body>
</html>
