<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Time Attack Maze</title>
<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#33ff99;
  font-family:"Courier New",monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#title{
  font-size:30px;
  margin-bottom:10px;
  text-shadow:0 0 8px #33ff99;
}

#timer{
  margin-bottom:15px;
}

#game{
  display:grid;
  grid-template-columns:repeat(15,30px);
  grid-template-rows:repeat(15,30px);
  gap:2px;
}

.cell{
  width:30px;
  height:30px;
  background:#111;
}

.wall{ background:#33ff99; }
.player{ background:#00e5ff; }
.goal{ background:#ffff66; }
.enemy{ background:#ff3366; }

button{
  margin-top:15px;
  padding:6px 14px;
  background:black;
  color:#33ff99;
  border:1px solid #33ff99;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="title">RETRO MAZE ESCAPE</div>
<div id="timer">Time: 0.00</div>
<div id="game"></div>
<button onclick="startGame()">RESTART</button>

<script>
const size=15;
let maze=[];
let player={x:0,y:0};
let goal={x:size-1,y:size-1};
let enemy={x:7,y:7};

const game=document.getElementById("game");
const timerText=document.getElementById("timer");

let startTime;
let finished=false;

function randomMaze(){
  maze=[];
  for(let y=0;y<size;y++){
    let row=[];
    for(let x=0;x<size;x++){
      if(Math.random()<0.25 && !(x==0&&y==0) && !(x==goal.x&&y==goal.y)){
        row.push(1);
      }else{
        row.push(0);
      }
    }
    maze.push(row);
  }
}

function draw(){
  game.innerHTML="";
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      const cell=document.createElement("div");
      cell.classList.add("cell");

      if(maze[y][x]===1) cell.classList.add("wall");
      if(player.x===x && player.y===y) cell.classList.add("player");
      if(goal.x===x && goal.y===y) cell.classList.add("goal");
      if(enemy.x===x && enemy.y===y) cell.classList.add("enemy");

      game.appendChild(cell);
    }
  }
}

function movePlayer(dx,dy){
  if(finished) return;

  const nx=player.x+dx;
  const ny=player.y+dy;

  if(nx<0||ny<0||nx>=size||ny>=size) return;
  if(maze[ny][nx]===1) return;

  player.x=nx;
  player.y=ny;

  checkGame();
  draw();
}

function moveEnemy(){
  if(finished) return;

  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  const d=dirs[Math.floor(Math.random()*dirs.length)];

  const nx=enemy.x+d[0];
  const ny=enemy.y+d[1];

  if(nx<0||ny<0||nx>=size||ny>=size) return;
  if(maze[ny][nx]===1) return;

  enemy.x=nx;
  enemy.y=ny;

  checkGame();
  draw();
}

function checkGame(){
  if(player.x===enemy.x && player.y===enemy.y){
    finished=true;
    setTimeout(()=>alert("Caught by enemy! Game Over"),50);
  }

  if(player.x===goal.x && player.y===goal.y){
    finished=true;
    const t=((Date.now()-startTime)/1000).toFixed(2);
    setTimeout(()=>alert("GOAL! Time: "+t+" seconds"),50);
  }
}

function updateTimer(){
  if(finished) return;
  const t=(Date.now()-startTime)/1000;
  timerText.textContent="Time: "+t.toFixed(2);
}

function startGame(){
  randomMaze();
  player={x:0,y:0};
  enemy={x:Math.floor(size/2),y:Math.floor(size/2)};
  finished=false;
  startTime=Date.now();
  draw();
}

setInterval(updateTimer,50);
setInterval(moveEnemy,400);

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") movePlayer(0,-1);
  if(e.key==="ArrowDown") movePlayer(0,1);
  if(e.key==="ArrowLeft") movePlayer(-1,0);
  if(e.key==="ArrowRight") movePlayer(1,0);
});

startGame();
</script>

</body>
</html>
