<!DOCTYPE html>
<html>
<head>
    <title>Magical Drop Puzzle</title>
    <style>
        body { background: #fff0f5; display: flex; flex-direction: column; align-items: center; font-family: 'Arial', sans-serif; }
        h1 { color: #ff69b4; text-shadow: 2px 2px #fff; }
        canvas { border: 5px solid #ffb6c1; background: #fafafa; border-radius: 10px; box-shadow: 0 0 20px rgba(255,182,193,0.5); }
    </style>
</head>
<body>
    <h1>🎀 Magical Jewel 🎀</h1>
    <canvas id="gameCanvas" width="240" height="480"></canvas>
    <p>【← →】移動 【↓】加速 【Z】回転</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ROWS = 12;
        const COLS = 6;
        const SIZE = 40;
        const COLORS = [null, '#ff99cc', '#99ccff', '#ccff99', '#ffff99']; // 宝石の色

        // 盤面の初期化
        let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

        // 現在操作中のドロップ（2個1組）
        let player = {
            x: 2, y: 0,
            cells: [Math.floor(Math.random() * 4) + 1, Math.floor(Math.random() * 4) + 1],
            dir: 0 // 0:上, 1:右, 2:下, 3:左
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 盤面の描画
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(board[r][c]) drawGem(c, r, board[r][c]);
                }
            }

            // 操作中のドロップ描画
            drawGem(player.x, player.y, player.cells[0]);
            let subX = player.x + (player.dir === 1 ? 1 : player.dir === 3 ? -1 : 0);
            let subY = player.y + (player.dir === 2 ? 1 : player.dir === 0 ? -1 : 0);
            drawGem(subX, subY, player.cells[1]);
        }

        function drawGem(x, y, colorIdx) {
            ctx.fillStyle = COLORS[colorIdx];
            ctx.beginPath();
            ctx.arc(x*SIZE + SIZE/2, y*SIZE + SIZE/2, SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();
            // ハイライト（キラキラ感）
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(x*SIZE + SIZE/3, y*SIZE + SIZE/3, SIZE/6, 0, Math.PI*2);
            ctx.fill();
        }

        // 簡易的な落下処理
        function drop() {
            player.y++;
            if (player.y >= ROWS || board[player.y][player.x]) {
                // ここに設置判定と連鎖判定を入れる（今回は基本移動のみ）
                player.y = 0;
            }
            draw();
        }

        setInterval(drop, 1000); // 1秒ごとに落下
        draw();
    </script>
</body>
</html>
