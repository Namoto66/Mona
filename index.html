<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>射的ゲーム</title>

<style>
body{
text-align:center;
background:#111;
color:white;
font-family:sans-serif;
}

canvas{
background:#222;
border:3px solid white;
cursor:crosshair;
}
</style>

</head>

<body>

<h1>🎯 射的ゲーム</h1>
<p>マウスで狙ってクリック！</p>
<p>スコア: <span id="score">0</span></p>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;

let target = {
x:100,
y:200,
size:35,
dx:3
};

const shotSound = new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg");
const hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function drawTarget(){

ctx.beginPath();
ctx.arc(target.x,target.y,target.size,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();

ctx.beginPath();
ctx.arc(target.x,target.y,target.size/2,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

ctx.beginPath();
ctx.arc(target.x,target.y,target.size/4,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();

}

function update(){

ctx.clearRect(0,0,600,400);

target.x += target.dx;

if(target.x > 560 || target.x < 40){
target.dx *= -1;
}

drawTarget();

requestAnimationFrame(update);

}

canvas.addEventListener("click", function(e){

shotSound.currentTime = 0;
shotSound.play();

let rect = canvas.getBoundingClientRect();

let mouseX = e.clientX - rect.left;
let mouseY = e.clientY - rect.top;

let distance = Math.sqrt(
(mouseX-target.x)**2 +
(mouseY-target.y)**2
);

if(distance < target.size){

hitSound.currentTime = 0;
hitSound.play();

score += 10;

document.getElementById("score").textContent = score;

target.x = Math.random()*500+50;
target.y = Math.random()*300+50;

}

});

update();

</script>

</body>
</html>
