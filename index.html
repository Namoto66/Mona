<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Animal Hunter Carnival</title>

<style>

body{
margin:0;
background:#0f1720;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
border:4px solid white;
cursor:none;
}

#ui{
padding:10px;
font-size:18px;
}

button{
padding:8px 16px;
margin:5px;
font-size:16px;
}

</style>
</head>

<body>

<h1>🦊 Animal Hunter Carnival</h1>

<div id="ui">
Score: <span id="score">0</span>
|
Level: <span id="level">1</span>
|
Weapon: <span id="weapon">Rifle</span>
|
Achievements: <span id="ach">0</span>
</div>

<canvas id="game" width="900" height="500"></canvas>

<br>

<button onclick="startGame()">Start</button>
<button onclick="setWeapon('rifle')">Rifle</button>
<button onclick="setWeapon('shotgun')">Shotgun</button>
<button onclick="setWeapon('sniper')">Sniper</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let level=1;
let animals=[];
let trees=[];
let weapon="rifle";
let mouseX=0;
let mouseY=0;

let achievements=0;

const shotSound=new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg");
const hitSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

function startGame(){

score=0;
level=1;
animals=[];
trees=[];

spawnTrees();
spawnAnimals();

}

function setWeapon(w){

weapon=w;
document.getElementById("weapon").textContent=w;

}

function spawnTrees(){

for(let i=0;i<5;i++){

trees.push({
x:Math.random()*800+50,
y:Math.random()*400+50
})

}

}

function spawnAnimals(){

for(let i=0;i<5+level;i++){

animals.push(createAnimal());

}

}

function createAnimal(){

let types=[
{emoji:"🐰",speed:2,hp:1,points:10},
{emoji:"🦊",speed:3,hp:1,points:20},
{emoji:"🐻",speed:1,hp:3,points:40}
];

let t=types[Math.floor(Math.random()*types.length)];

return{
x:Math.random()*800+50,
y:Math.random()*400+50,
dx:(Math.random()<0.5?-1:1)*t.speed,
dy:(Math.random()<0.5?-1:1)*t.speed,
emoji:t.emoji,
hp:t.hp,
points:t.points
}

}

canvas.addEventListener("mousemove",e=>{

let rect=canvas.getBoundingClientRect();
mouseX=e.clientX-rect.left;
mouseY=e.clientY-rect.top;

});

canvas.addEventListener("click",()=>{

shotSound.play();

let radius=30;

if(weapon==="shotgun") radius=80;
if(weapon==="sniper") radius=15;

for(let i=animals.length-1;i>=0;i--){

let a=animals[i];

let dist=Math.sqrt(
(mouseX-a.x)**2+(mouseY-a.y)**2
);

if(dist<radius){

a.hp--;

hitSound.play();

if(a.hp<=0){

score+=a.points;

animals.splice(i,1);

if(score>level*200){

level++;
spawnAnimals();

}

if(score>500 && achievements<1){
achievements++;
alert("🏆 Achievement: Hunter!");
}

}

}

}

document.getElementById("score").textContent=score;
document.getElementById("level").textContent=level;
document.getElementById("ach").textContent=achievements;

});

function updateAnimals(){

for(let a of animals){

let dx=a.x-mouseX;
let dy=a.y-mouseY;

if(Math.sqrt(dx*dx+dy*dy)<120){

a.x+=dx*0.05;
a.y+=dy*0.05;

}else{

a.x+=a.dx;
a.y+=a.dy;

}

if(a.x<0||a.x>900) a.dx*=-1;
if(a.y<0||a.y>500) a.dy*=-1;

}

}

function drawTrees(){

ctx.font="40px serif";

for(let t of trees){

ctx.fillText("🌲",t.x,t.y);

}

}

function drawAnimals(){

ctx.textAlign="center";
ctx.textBaseline="middle";

for(let a of animals){

ctx.font="40px serif";
ctx.fillText(a.emoji,a.x,a.y);

}

}

function drawCrosshair(){

ctx.strokeStyle="white";

ctx.beginPath();
ctx.moveTo(mouseX-15,mouseY);
ctx.lineTo(mouseX+15,mouseY);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(mouseX,mouseY-15);
ctx.lineTo(mouseX,mouseY+15);
ctx.stroke();

}

function gameLoop(){

ctx.clearRect(0,0,900,500);

if(level%2===0){

canvas.style.background="#dff2ff";

}else{

canvas.style.background="#1b2b1b";

}

updateAnimals();

drawTrees();
drawAnimals();
drawCrosshair();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
